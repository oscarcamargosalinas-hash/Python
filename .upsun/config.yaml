applications:
  app:
    type: python:3.13

    hooks:
      build: |
        set -ex
        pip install -r requirements.txt

    web:
      commands:
        start: gunicorn learning_log.wsgi:application --bind 0.0.0.0:$PORT

    relationships:
      database: {}

services:
  database:
    type: postgresql:18

routes:
  "https://{default}/":
    type: upstream
    upstream: "app:http"