applications:
  app:
    type: python:3.13

    relationships:
      database: "db:postgresql" # El nombre debe coincidir con el servicio abajo

    mounts:
      'static':
        source: local
        source_path: static

    hooks:
      build: |
        set -ex
        pip install --upgrade pip
        pip install -r requirements.txt
        python manage.py collectstatic --noinput
      deploy: |
        set -ex
        python manage.py migrate

    web:
      upstream:
        socket_family: unix
      commands:
        # AQUÍ ESTABA EL ERROR: Debe ser test_project
        start: gunicorn -w 4 -b unix:$SOCKET test_project.wsgi:application
      
      locations:
        "/":
          passthru: true
        "/static":
          root: "static"
          expires: 1h
          allow: true

services:
  db: # Nombre corto y claro
    type: postgresql:15
    disk: 1024

routes:
  "https://{default}/":
    type: upstream
    upstream: "app:http"

  "https://www.{default}/":
    type: redirect
    to: "https://{default}/"